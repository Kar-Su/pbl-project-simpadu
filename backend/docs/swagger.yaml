host: localhost
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: '**DEFAULT ROUTE GOLANG /api**.'
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TIM 1 API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Proses autentikasi user untuk mendapatkan Access Token dan Refresh Token.

        **Akses:** Public (tidak memerlukan autentikasi).

        **Error yang mungkin terjadi:**
        - `400` Body tidak valid / field wajib kosong -> `message: "failed to get data from body", error: "Key: 'Email' Error:..."`
        - `400` Email tidak terdaftar -> `message: "failed to login user", error: "user not found"`
        - `400` Password salah -> `message: "failed to login user", error: "crypto/bcrypt: ..."`
        - `500` Kesalahan internal server -> `message: "failed to login user", error: "Internal Error"`
      parameters:
      - description: Payload Login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web-hosting_internal_modules_user_dto.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web-hosting_internal_package_utils.Response-web-hosting_internal_modules_auth_dto_TokenResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrLoginFailed'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrLoginInternalServer'
      summary: User Login
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Menghapus session user dan menghapus semua refresh token milik user dari database.

        **Akses:** Authenticated User (memerlukan Bearer Token di header Authorization).

        **Error yang mungkin terjadi:**
        - `401` Authorization header tidak ada -> `message: "failed_auth", error: "Authorization header missing"`
        - `401` Format header salah (bukan "Bearer ...") -> `message: "failed_auth", error: "invalid authentication header"`
        - `401` Token JWT tidak valid atau kedaluwarsa -> `message: "failed_auth", error: "invalid token"`
        - `400` Logout gagal (non-internal error) -> `message: "failed logout", error: "..."`
        - `500` Kesalahan internal server -> `message: "failed logout", error: "Internal Error"`
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web-hosting_internal_package_utils.Response-any-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrLogoutFailed'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrUnauthorizedInvalidToken'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrLogoutFailed'
      security:
      - ApiKeyAuth: []
      summary: User Logout
      tags:
      - auth
  /api/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: |-
        Mendapatkan access token baru menggunakan refresh token yang masih valid.
        Refresh token lama akan dihapus dan digantikan dengan refresh token baru.

        **Akses:** Public (tidak memerlukan autentikasi, cukup dengan refresh token).

        **Error yang mungkin terjadi:**
        - `400` Body tidak valid / field wajib kosong -> `message: "failed to get data from body", error: "Key: 'RefreshToken' Error:..."`
        - `400` Refresh token tidak ditemukan di database -> `message: "failed refresh token", error: "refresh token not found"`
        - `401` Refresh token sudah kedaluwarsa -> `message: "failed refresh token", error: "refresh token expired"`
        - `500` Kesalahan internal server -> `message: "failed refresh token", error: "Internal Error"`
      parameters:
      - description: Payload Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web-hosting_internal_modules_auth_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web-hosting_internal_package_utils.Response-web-hosting_internal_modules_auth_dto_TokenResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrRefreshTokenNotFound'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrRefreshTokenExpired'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrRefreshTokenInternalServer'
      summary: Refresh Access Token
      tags:
      - auth
  /api/auth/refresh-token/{refresh_token}:
    get:
      consumes:
      - application/json
      description: |-
        Mengambil data detail dari sebuah refresh token berdasarkan string token-nya.

        **Akses:** Authenticated User (memerlukan Bearer Token di header Authorization).

        **Error yang mungkin terjadi:**
        - `401` Authorization header tidak ada -> `message: "failed_auth", error: "Authorization header missing"`
        - `401` Format header salah (bukan "Bearer ...") -> `message: "failed_auth", error: "invalid authentication header"`
        - `401` Token JWT tidak valid atau kedaluwarsa -> `message: "failed_auth", error: "invalid token"`
        - `404` Token tidak ditemukan di database -> `message: "failed find refresh token", error: "refresh token not found"`
        - `500` Kesalahan internal server -> `message: "failed find refresh token", error: "Internal Error"`
      parameters:
      - description: String Refresh Token
        example: MBG-JAYA67
        in: path
        name: refresh_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web-hosting_internal_package_utils.Response-web-hosting_internal_modules_auth_dto_RefreshTokenResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrUnauthorizedInvalidToken'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/web-hosting_internal_package_swagger.ErrFindRefreshTokenNotFound'
        "500":
          description: Internal Server Error
