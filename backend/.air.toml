# .air.toml
root = "."
testdata_dir = "testdata"
tmp_dir = "cmd/tmp"

[build]
  cmd = "go build -o ./cmd/tmp/main ./cmd/main.go"
  bin = "./cmd/tmp/main"
  full_bin = ""
  args_bin = []
  delay = 1000
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  include_dir = []
  include_file = []
  log = "build-errors.log"
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
